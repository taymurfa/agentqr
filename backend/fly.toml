# fly.toml app configuration file generated for agentqr-api on 2026-06-13T04:05:36-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agentqr-api'
primary_region = 'iad'

[build]

[env]
  APP_ENV = 'production'
  APP_HOST = '0.0.0.0'
  CORS_ORIGINS = 'http://localhost:3000,http://localhost:3001'
  PORT = '8000'
  TRADING_AUTO_EXECUTE = 'false'
  TRADING_DRY_RUN = 'true'
  TRADING_MODE = 'mock'

[[mounts]]
  source = 'agentqr_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
