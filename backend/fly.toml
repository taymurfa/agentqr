# Fly.io config for AgentQR backend.
# Run `fly launch --copy-config --no-deploy` to register the app under your account,
# then `fly volumes create agentqr_data --size 1` and `fly deploy`.

app = "agentqr-api"
primary_region = "iad"

[build]

[env]
  APP_HOST = "0.0.0.0"
  APP_ENV = "production"
  PORT = "8000"
  TRADING_MODE = "mock"
  TRADING_DRY_RUN = "true"
  TRADING_AUTO_EXECUTE = "false"
  # Override these to whatever you deploy the frontend at.
  CORS_ORIGINS = "http://localhost:3000,http://localhost:3001"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[mounts]]
  source = "agentqr_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
